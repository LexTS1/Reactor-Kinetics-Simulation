# Representative, educational PWR-like point-kinetics parameters.
# These values are not plant-specific licensed data and must not be used for reactor design, operation, licensing, or safety analysis.

name: "Representative PWR-like U-235 point kinetics parameters"
description: >
  Educational reference parameters for point-kinetics validation.
  These values are representative and are not plant-specific licensed data.

kinetics:
  Lambda: 1.0e-5
  beta:
    - 0.000215
    - 0.001424
    - 0.001274
    - 0.002568
    - 0.000748
    - 0.000273
  lambda:
    - 0.0124
    - 0.0305
    - 0.111
    - 0.301
    - 1.14
    - 3.01

thermal:
  enabled: true
  Tf0: 900.0
  Tm0: 580.0
  Tc: 560.0
  Cf: 2.0e7
  Cm: 8.0e7
  Hfm: 1.0e5
  Hmc: 8.0e4
  alpha_f: -3.0e-5
  alpha_m: -5.0e-5
  power_scale: 3.0e9
