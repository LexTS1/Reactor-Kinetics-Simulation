inputs:
  external_rho:
    label: "External reactivity"
    unit: "delta-k/k"
    type: "float"
    default: 0.0
    min: -0.02
    max: 0.02
    step: 0.0001
    description: "User-defined external reactivity insertion."

  rod_insertion_fraction:
    label: "Control rod insertion"
    unit: "fraction"
    type: "float"
    default: 0.5
    min: 0.0
    max: 1.0
    step: 0.01
    description: "1.0 is fully inserted; 0.0 is fully withdrawn."

  boron_ppm:
    label: "Boron concentration"
    unit: "ppm"
    type: "float"
    default: 1000.0
    min: 0.0
    max: 2500.0
    step: 10.0
    description: "Soluble boron concentration in the coolant."

  fuel_temperature:
    label: "Fuel temperature"
    unit: "K"
    type: "float"
    default: 900.0
    min: 500.0
    max: 1600.0
    step: 10.0
    description: "Effective lumped fuel temperature."

  moderator_temperature:
    label: "Moderator temperature"
    unit: "K"
    type: "float"
    default: 580.0
    min: 450.0
    max: 650.0
    step: 1.0
    description: "Effective lumped moderator temperature."
